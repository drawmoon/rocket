version: "3.1"

services:
  metad0:
    image: localhost/nebula-metad:${IMAGE_VERSION-latest}
    environment:
      USER: root
    command:
      - --meta_server_addrs=metad0:9559
      - --local_ip=metad0
      - --ws_ip=metad0
      - --port=9559
      - --ws_http_port=19559
      - --data_path=/data/meta
      - --log_dir=/logs
      - --v=0
      - --minloglevel=0
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://metad0:19559/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    # ports:
    #   - 9559:9559
    #   - 19559:19559
    #   - 19560
    volumes:
      - ${STORAGE_ROOT-./storage}/nebula/metad/data/meta0:/data/meta
      - ${STORAGE_ROOT-./storage}/nebula/metad/logs/meta0:/logs
    # networks:
    #   - nebula-net
    restart: on-failure
    cap_add:
      - SYS_PTRACE

  storaged0:
    image: localhost/nebula-storaged:${IMAGE_VERSION-latest}
    environment:
      USER: root
      TZ: "${TZ-UTC}"
    command:
      - --meta_server_addrs=metad0:9559
      - --local_ip=storaged0
      - --ws_ip=storaged0
      - --port=9779
      - --ws_http_port=19779
      - --data_path=/data/storage
      - --log_dir=/logs
      - --v=0
      - --minloglevel=0
    depends_on:
      - metad0
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://storaged0:19779/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    # ports:
    #   - 9779:9779
    #   - 19779:19779
    #   - 19780
    volumes:
      - ${STORAGE_ROOT-./storage}/nebula/storaged/data/storage0:/data/storage
      - ${STORAGE_ROOT-./storage}/nebula/storaged/logs/storage0:/logs
    # networks:
    #   - nebula-net
    restart: on-failure
    cap_add:
      - SYS_PTRACE

  graphd:
    image: localhost/nebula-graphd:${IMAGE_VERSION-latest}
    environment:
      USER: root
      TZ: "${TZ-UTC}"
    command:
      - --meta_server_addrs=metad0:9559
      - --port=9669
      - --local_ip=graphd
      - --ws_ip=graphd
      - --ws_http_port=19669
      - --log_dir=/logs
      - --v=0
      - --minloglevel=0
    depends_on:
      - storaged0
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://graphd:19669/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    ports:
      - 9669:9669
    #   - 19669:19669
    #   - 19670
    volumes:
      - ${STORAGE_ROOT-./storage}/nebula/graphd/logs/graph:/logs
    # networks:
    #   - nebula-net
    restart: on-failure
    cap_add:
      - SYS_PTRACE
    networks:
      default:
        aliases:
          - nebula
          - nebula.internal

  nebula-console:
    image: localhost/nebula-console:${IMAGE_VERSION-latest}
    entrypoint: ""
    command:
      - sh
      - -c
      - |
        for i in `seq 1 60`;do
          var=`nebula-console -addr graphd -port 9669 -u root -p nebula -e 'ADD HOSTS "storaged0":9779'`;
          if [[ $$? == 0 ]];then
            break;
          fi;
          sleep 1;
          echo "retry to add hosts.";
        done && tail -f /dev/null;

    depends_on:
      - graphd

  graph-studio:
    image: localhost/nebula-graph-studio:${IMAGE_VERSION-latest}
    environment:
      USER: root
    # ports:
    #   - 7001:7001
    networks:
      default:
        aliases:
          - graph-studio.internal
    profiles: [debug]
